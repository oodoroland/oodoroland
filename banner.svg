<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0c0c0b"/>
      <stop offset="100%" style="stop-color:#161614"/>
    </linearGradient>
    <linearGradient id="top-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#c8a96e; stop-opacity:0.9"/>
      <stop offset="50%"  style="stop-color:#c8a96e; stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#c8a96e; stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="1" fill="url(#top-line)"/>

  <!-- left amber bar -->
  <rect x="52" y="58" width="2" height="104" fill="#c8a96e" opacity="0.85"/>

  <!-- name -->
  <text
    x="74" y="108"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="42"
    font-weight="400"
    letter-spacing="0.5"
    fill="#f0ede6"
  >Roland Oodo</text>

  <!-- subtitle: each segment positioned using textLength to guarantee no overlap -->

  <!-- segment 1: FULL-STACK DEVELOPER -->
  <text
    x="76" y="148"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    letter-spacing="2.6"
    textLength="176"
    lengthAdjust="spacing"
    fill="#6a6860"
  >FULL-STACK DEVELOPER</text>

  <!-- dot 1 -->
  <circle cx="266" cy="143" r="1.6" fill="#c8a96e" opacity="0.6"/>

  <!-- segment 2: PRODUCTION INFRASTRUCTURE -->
  <text
    x="280" y="148"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    letter-spacing="2.6"
    textLength="218"
    lengthAdjust="spacing"
    fill="#504f4c"
  >PRODUCTION INFRASTRUCTURE</text>

  <!-- dot 2 -->
  <circle cx="512" cy="143" r="1.6" fill="#c8a96e" opacity="0.6"/>

  <!-- segment 3: OPEN TO REMOTE - amber -->
  <text
    x="526" y="148"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    letter-spacing="2.6"
    textLength="148"
    lengthAdjust="spacing"
    fill="#c8a96e"
    opacity="0.9"
  >OPEN TO REMOTE</text>

  <rect x="0" y="219" width="900" height="1" fill="#f0ede6" opacity="0.04"/>
</svg>
