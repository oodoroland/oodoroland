<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0c0c0b"/>
      <stop offset="100%" style="stop-color:#141412"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="160" fill="url(#bg)"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="900" height="1" fill="#c8a96e" opacity="0.5"/>

  <!-- left gold bar -->
  <rect x="48" y="36" width="2" height="88" fill="#c8a96e" opacity="0.8"/>

  <!-- name -->
  <text x="68" y="72" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="400" letter-spacing="1" fill="#f0ede6">Roland Oodo</text>

  <!-- role line -->
  <text x="70" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="3" fill="#7a7870" text-transform="uppercase">FULL-STACK DEVELOPER</text>

  <!-- separator dot -->
  <circle cx="268" cy="95" r="1.5" fill="#c8a96e" opacity="0.7"/>

  <!-- tagline -->
  <text x="280" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="3" fill="#7a7870">PRODUCTION INFRASTRUCTURE</text>

  <!-- bottom subtle rule -->
  <rect x="0" y="159" width="900" height="1" fill="#f0ede6" opacity="0.05"/>

  <!-- corner mark -->
  <text x="836" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3a3936" letter-spacing="1">NGR · RMT</text>
</svg>
